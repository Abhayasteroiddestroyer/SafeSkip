<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Abhay Chauhan | Smart Bunk Manager</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body class="dark">
    <div class="container">
        <h1>BunkManager<span>.</span></h1>
        
        <!-- Step 1: Semester Settings -->
        <section class="panel">
            <h3>1. Semester Setup</h3>
            <div class="flex-row">
                <input type="month" id="start-month" value="2024-01">
                <span>to</span>
                <input type="month" id="end-month" value="2024-06">
                <input type="number" id="criteria" value="75" placeholder="Criteria %">
            </div>
            <div class="days-selector">
                <p>Select College Off-Days:</p>
                <label><input type="checkbox" value="0"> Sun</label>
                <label><input type="checkbox" value="6"> Sat</label>
            </div>
            <button onclick="addHoliday()" class="sec-btn">+ Add Custom Holiday</button>
            <div id="holiday-list"></div>
        </section>

        <!-- Step 2: OCR Upload -->
        <section class="panel">
            <h3>2. Upload Timetable Photo</h3>
            <input type="file" id="image-input" accept="image/*">
            <div id="status">Ready</div>
        </section>

        <!-- Step 3: Confirmation & Results -->
        <section id="result-panel" class="panel" style="display:none;">
            <h3>3. Confirm Subjects & View Skips</h3>
            <div id="subject-confirm-list"></div>
            <button id="calculate-btn" class="main-btn">Finalize Attendance Plan</button>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
